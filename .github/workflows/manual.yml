name: Playwright Manual Execution

on:
  workflow_dispatch:
    inputs:
      suite:
        description: 'Select Test Suite'
        required: true
        default: 'smoke'
        type: choice
        options:
          - smoke
          - sanity
          - full

jobs:
  playwright-tests:

    runs-on: ubuntu-latest

    steps:

      # Checkout code from selected branch
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Install dependencies
      - name: Install Dependencies
        run: npm ci

      # Install Playwright browsers
      - name: Install Browsers
        run: npx playwright install --with-deps

      # Execute selected suite
      - name: Run Selected Suite
        run: |
          if [ "${{ github.event.inputs.suite }}" = "smoke" ]; then
            echo "Running Smoke Suite"
            npx playwright test --grep "@smoke"

          elif [ "${{ github.event.inputs.suite }}" = "sanity" ]; then
            echo "Running Sanity Suite"
            npx playwright test --grep "@sanity"

          else
            echo "Running Complete Suite"
            npx playwright test

          fi

      # Upload HTML report
      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
